<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget 26">
<meta name="theme-color" content="#0c0f16">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Budget 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f16;
  --card: #151921;
  --card-hover: #1a1f2b;
  --border: #222836;
  --text: #e4e6ec;
  --text-muted: #5c6277;
  --accent: #3b82f6;
  --accent-dim: #3b82f620;
  --green: #22c55e;
  --green-dim: #22c55e18;
  --red: #ef4444;
  --red-dim: #ef444418;
  --amber: #f59e0b;
  --amber-dim: #f59e0b18;
  --purple: #a855f7;
  --purple-dim: #a855f718;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Outfit', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-top: var(--safe-top);
  padding-bottom: calc(68px + var(--safe-bottom));
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ── Header ── */
.header {
  padding: 20px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size:22px; font-weight:800; letter-spacing:-.5px; }
.header h1 span { color:var(--accent); }
.header-sub { font-size:13px; color:var(--text-muted); font-weight:500; margin-top:2px; }
.header-btn {
  background:var(--card); border:1px solid var(--border); color:var(--text-muted);
  padding:8px 14px; border-radius:10px; font-size:12px; font-weight:600;
  font-family:inherit; cursor:pointer; transition:color .2s;
}

/* ── Tab Bar ── */
.tab-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:#0c0f16ee;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding:8px 12px calc(8px + var(--safe-bottom));
  z-index:100;
}
.tab-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--text-muted);
  font-family:inherit; font-size:10px; font-weight:600;
  padding:6px 4px; cursor:pointer; transition:color .2s;
}
.tab-btn.active { color:var(--accent); }
.tab-btn svg { width:22px; height:22px; }

/* ── Month Selector ── */
.month-scroll {
  display:flex; gap:6px; padding:0 20px 16px;
  overflow-x:auto; scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.month-scroll::-webkit-scrollbar { display:none; }
.month-chip {
  scroll-snap-align:start;
  padding:8px 16px; border-radius:10px;
  background:var(--card); border:1px solid var(--border);
  color:var(--text-muted); font-size:13px; font-weight:600;
  font-family:inherit; cursor:pointer; white-space:nowrap;
  transition:all .15s;
}
.month-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── Cards ── */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px; margin:0 16px 12px;
  border-left:3px solid var(--cc, var(--border));
}
.card-title {
  font-size:13px; font-weight:700; color:var(--text-muted);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}

/* ── Summary Chips ── */
.summary-row {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  padding:0 16px 12px;
}
.summary-chip {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px;
  border-top:3px solid var(--chip-accent, var(--border));
}
.summary-chip .label {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--text-muted); margin-bottom:4px;
}
.summary-chip .value { font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.summary-chip .sub { font-size:11px; color:var(--text-muted); margin-top:3px; }

/* ── Delta ── */
.delta { font-size:10px; font-weight:700; margin-top:2px; }
.delta.pos { color:var(--green); }
.delta.neg { color:var(--red); }

/* ── Empty Hint ── */
.empty-hint {
  margin:0 16px 12px;
  padding:14px 16px;
  background:var(--accent-dim);
  border:1px solid var(--accent);
  border-left:3px solid var(--accent);
  border-radius:var(--radius);
}
.empty-hint-title { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:3px; }
.empty-hint-sub { font-size:12px; color:var(--text-muted); }

/* ── Input Rows ── */
.input-row {
  display:flex; align-items:center; gap:10px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.input-row:last-child { border-bottom:none; }
.input-row label {
  font-size:13px; color:var(--text-muted); font-weight:500;
  min-width:0; flex:1;
}
.input-row input[type="number"],
.input-row input[type="text"],
.input-row input[type="date"],
.input-row select {
  background:var(--bg); border:1px solid var(--border);
  color:var(--text); border-radius:10px; padding:10px 12px;
  font-family:'JetBrains Mono',monospace; font-size:14px;
  outline:none; width:130px; text-align:right;
  -webkit-appearance:none;
}
.input-row input:focus, .input-row select:focus { border-color:var(--accent); }

/* ── Fix Label Input ── */
.fix-label-input {
  background:transparent; border:1px solid transparent;
  color:var(--text-muted); font-family:'Outfit',sans-serif;
  font-size:13px; font-weight:500;
  outline:none; flex:1; min-width:0;
  padding:4px 6px; border-radius:6px; margin-left:-6px;
  transition:border-color .15s, background .15s;
}
.fix-label-input:focus {
  border-color:var(--border); background:var(--bg); color:var(--text);
}

/* ── Fix Rows Wrapper ── */
.fix-rows > .input-row:last-child { border-bottom:none; }
.fix-add-btn {
  width:100%; padding:8px; border-radius:10px;
  background:transparent; border:1px dashed var(--border);
  color:var(--text-muted); font-size:12px; font-weight:600;
  font-family:inherit; cursor:pointer; margin-top:8px;
}

/* ── Variable Costs ── */
.var-entry {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:10px; padding:12px; margin-bottom:8px;
}
.var-entry:last-child { margin-bottom:0; }
.var-entry-row {
  display:grid; grid-template-columns:1fr 1fr auto; gap:8px;
  margin-bottom:6px; align-items:center;
}
.var-input {
  background:var(--bg); border:1px solid var(--border);
  color:var(--text); border-radius:10px; padding:10px 12px;
  font-family:inherit; font-size:13px; outline:none; width:100%;
  box-sizing:border-box; min-width:0;
}
.var-input:focus { border-color:var(--accent); }
.var-input-amount { font-family:'JetBrains Mono',monospace; text-align:right; }
.var-delete {
  background:var(--red-dim); border:none; color:var(--red);
  width:36px; height:36px; border-radius:10px;
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.var-add {
  width:100%; padding:12px; border-radius:12px;
  background:var(--accent-dim); border:1px dashed var(--accent);
  color:var(--accent); font-size:14px; font-weight:600;
  font-family:inherit; cursor:pointer; margin-top:10px;
}

/* ── Recurring Button ── */
.recurring-btn {
  background:none; border:1px solid var(--border); color:var(--text-muted);
  width:32px; height:32px; border-radius:8px; font-size:15px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
}
.recurring-btn.active {
  background:var(--accent-dim); border-color:var(--accent); color:var(--accent);
}

/* ── Quick Add Form ── */
.qa-form {
  display:flex; gap:8px; align-items:center;
  margin-bottom:12px; padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.qa-input {
  background:var(--bg); border:1px solid var(--border);
  color:var(--text); border-radius:10px; padding:10px 12px;
  font-family:inherit; font-size:13px; outline:none;
  box-sizing:border-box; min-width:0;
}
.qa-input:focus { border-color:var(--accent); }
.qa-amount {
  font-family:'JetBrains Mono',monospace; text-align:right; width:90px; flex-shrink:0;
}
.qa-btn {
  background:var(--accent); border:none; color:#fff;
  width:36px; height:36px; border-radius:10px;
  font-size:22px; font-weight:300; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}

/* ── Cat Limit Rows ── */
.cat-limit-section { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
.cat-limit-row { display:flex; align-items:center; gap:8px; padding:5px 0; }
.cat-limit-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cat-limit-name { font-size:12px; font-weight:600; min-width:56px; }
.cat-limit-amount { font-family:'JetBrains Mono',monospace; font-size:12px; white-space:nowrap; }
.cat-limit-input {
  background:var(--bg); border:1px solid var(--border); color:var(--text-muted);
  border-radius:8px; padding:4px 8px; font-family:'JetBrains Mono',monospace; font-size:11px;
  outline:none; width:72px; text-align:right; -webkit-appearance:none;
}
.cat-limit-input:focus { border-color:var(--accent); color:var(--text); }
.cat-limit-label { font-size:9px; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
.cat-del-btn {
  background:none; border:none; color:var(--text-muted);
  width:22px; height:22px; font-size:16px; line-height:1;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:color .15s;
}
.cat-del-btn:not([disabled]):hover { color:var(--red); }

/* ── Progress Bar ── */
.progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; flex:1; }
.progress-fill { height:100%; border-radius:3px; transition:width .5s ease; }

/* ── Small Button ── */
.small-btn {
  background:var(--bg); border:1px solid var(--border); color:var(--text-muted);
  padding:4px 10px; border-radius:8px; font-size:11px; font-weight:600;
  font-family:inherit; cursor:pointer; white-space:nowrap; flex-shrink:0;
  text-transform:none; letter-spacing:0;
}

/* ── Year Table ── */
.year-table { width:100%; border-collapse:collapse; font-size:13px; }
.year-table th {
  text-align:right; padding:10px 8px; font-size:10px;
  font-weight:700; text-transform:uppercase; letter-spacing:.5px;
  color:var(--text-muted); border-bottom:2px solid var(--border);
}
.year-table th:first-child { text-align:left; }
.year-table td {
  padding:10px 8px; text-align:right; border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace; font-size:12px;
}
.year-table td:first-child {
  text-align:left; font-family:'Outfit',sans-serif; font-weight:600; font-size:13px;
}
.year-table tr.total-row { background:var(--card-hover); }
.year-table tr.total-row td { font-weight:700; font-size:13px; }
.year-table tr.max-row td:first-child { color:var(--red); }

/* ── Bar Chart ── */
.chart-container { padding:0 4px; }
.chart-bars { display:flex; align-items:flex-end; gap:4px; height:160px; }
.chart-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.chart-pair { display:flex; gap:2px; align-items:flex-end; width:100%; height:136px; }
.chart-bar { flex:1; border-radius:3px 3px 0 0; min-height:0; transition:height .4s ease; }
.chart-label { font-size:9px; color:var(--text-muted); font-weight:600; }
.chart-legend { display:flex; gap:16px; justify-content:center; margin-top:12px; }
.chart-legend span { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-muted); }
.chart-legend-dot { width:10px; height:10px; border-radius:3px; }

/* ── Modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:200;
  display:flex; align-items:flex-end; justify-content:center;
  animation:fadeIn .2s;
}
.modal {
  background:var(--card); border-radius:20px 20px 0 0;
  padding:28px 24px calc(28px + var(--safe-bottom));
  width:100%; max-width:500px;
  animation:slideUp .25s ease;
}
.modal h3 { font-size:17px; font-weight:700; margin-bottom:8px; }
.modal p { font-size:14px; color:var(--text-muted); margin-bottom:24px; line-height:1.5; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; }
.modal-btn { padding:10px 22px; border-radius:12px; border:none; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
.modal-btn-cancel { background:var(--bg); color:var(--text-muted); }
.modal-btn-danger { background:var(--red-dim); color:var(--red); }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
input[type=number] { -moz-appearance:textfield; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── Constants ───
const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const MONTHS_SHORT = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const CATEGORIES_DEFAULT = ["Essen","Hobby","Freizeit","Ferien","Haushalt"];
const COLOR_PALETTE = ['#3b82f6','#a855f7','#22c55e','#f59e0b','#ef4444','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1'];
const getCatColor = i => COLOR_PALETTE[i % COLOR_PALETTE.length];
const FIX_LABELS_DEFAULT = ["Miete/Essen","Krankenkasse","Handy/Spotify","Motorrad Vers.","Weiterbildung","Steuern"];
const SAVE_LABELS = ["Sparkonto","Invest.","Säule 3a"];
const STORAGE_KEY = "budget2026_v2";
const SETTINGS_KEY = "budget2026_settings_v1";

const fmt = v => new Intl.NumberFormat("de-CH",{style:"currency",currency:"CHF"}).format(v||0);
const fmtShort = v => {
  v = Number(v) || 0;
  if (Math.abs(v) >= 1000) return (v / 1000).toFixed(1) + "k";
  return v.toFixed(0);
};

// ─── Data ───
function initMonth(){
  return {
    gehalt:0,
    fix: FIX_LABELS_DEFAULT.map(l=>({label:l,amount:0})),
    savings: SAVE_LABELS.map(l=>({label:l,amount:0})),
    variable: []
  };
}

function loadData(){
  try { const d=localStorage.getItem(STORAGE_KEY); if(d) return JSON.parse(d); } catch(e){}
  return Object.fromEntries(MONTHS.map(m=>[m,initMonth()]));
}
function saveData(data){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}catch(e){} }

function loadSettings(){
  try { const s=localStorage.getItem(SETTINGS_KEY); if(s) return JSON.parse(s); } catch(e){}
  return { catLimits:{}, sparZiel:0, categories:[...CATEGORIES_DEFAULT] };
}
function saveSettings(){ try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(SETTINGS))}catch(e){} }

let DATA = loadData();
let SETTINGS = loadSettings();
if(!SETTINGS.categories){ SETTINGS.categories=[...CATEGORIES_DEFAULT]; saveSettings(); }
const cats = () => SETTINGS.categories;
const isCatInUse = cat => MONTHS.some(m=>DATA[m].variable.some(v=>v.category===cat));
let STATE = { tab:"month", month:MONTHS[new Date().getMonth()], showReset:false, qa:{desc:'',amount:''} };

// ─── Helpers ───
function calcMonth(m){
  const d = DATA[m];
  const sumFix = d.fix.reduce((s,f)=>s+f.amount,0);
  const sumVar = d.variable.reduce((s,v)=>s+v.amount,0);
  const sumSave = d.savings.reduce((s,sv)=>s+sv.amount,0);
  const ausgaben = sumFix + sumVar + sumSave;
  return { einnahmen:d.gehalt, ausgaben, sparen:sumSave, fazit:d.gehalt-ausgaben, sumFix, sumVar, sumSave };
}

function prevMonthName(m){ const i=MONTHS.indexOf(m); return i>0?MONTHS[i-1]:null; }

function chipDelta(curr, prev, higherIsBetter){
  if(prev===null||prev===undefined) return '';
  const d = curr - prev;
  if(Math.abs(d) < 0.5) return '';
  const good = higherIsBetter ? d > 0 : d < 0;
  return `<div class="delta ${good?'pos':'neg'}">${d>0?'↑':'↓'} ${fmtShort(Math.abs(d))}</div>`;
}

function isMonthEmpty(m){
  const d = DATA[m];
  return d.gehalt===0 && d.fix.every(f=>f.amount===0) && d.savings.every(s=>s.amount===0) && d.variable.length===0;
}

function haptic(ms=10){ if(navigator.vibrate) navigator.vibrate(ms); }

function autoFillRecurring(month){
  const mi = MONTHS.indexOf(month);
  if(mi===0) return;
  const prev = MONTHS[mi-1];
  DATA[prev].variable.filter(v=>v.recurring).forEach(rv=>{
    const exists = DATA[month].variable.some(v=>v.recurring && v.desc===rv.desc && v.category===rv.category);
    if(!exists) DATA[month].variable.push({...rv, date:''});
  });
  saveData(DATA);
}

function switchMonth(m){
  STATE.month = m;
  STATE.qa = {desc:'',amount:''};
  autoFillRecurring(m);
  haptic();
  render();
}

function exportCSV(){
  const rows = [['Monat','Einnahmen','Fixkosten','Variabel','Sparen','Ausgaben','Fazit']];
  MONTHS.forEach(m=>{
    const c = calcMonth(m);
    rows.push([m,c.einnahmen.toFixed(2),c.sumFix.toFixed(2),c.sumVar.toFixed(2),c.sumSave.toFixed(2),c.ausgaben.toFixed(2),c.fazit.toFixed(2)]);
  });
  const csv = rows.map(r=>r.join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'budget_2026.csv';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function copyFixFromPrev(){
  const prev = prevMonthName(STATE.month);
  if(!prev) return;
  DATA[STATE.month].fix = DATA[prev].fix.map(f=>({...f}));
  saveData(DATA); haptic(); render();
}

// ─── Render Engine ───
function render(){
  const scrollY = window.scrollY;
  const app = document.getElementById("app");
  if(STATE.tab==="month") app.innerHTML = renderMonthView();
  else app.innerHTML = renderYearView();
  app.innerHTML += renderTabBar();
  if(STATE.showReset) app.innerHTML += renderResetModal();
  bindEvents();
  window.scrollTo(0, scrollY);
}

function renderTabBar(){
  return `<nav class="tab-bar">
    <button class="tab-btn ${STATE.tab==='month'?'active':''}" data-tab="month">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Monat
    </button>
    <button class="tab-btn ${STATE.tab==='year'?'active':''}" data-tab="year">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4z"/></svg>
      Übersicht
    </button>
  </nav>`;
}

// ─── Month View ───
function renderMonthView(){
  const m = STATE.month;
  const d = DATA[m];
  const c = calcMonth(m);
  const prevM = prevMonthName(m);
  const pc = prevM ? calcMonth(prevM) : null;
  const hasPrevFix = prevM && DATA[prevM].fix.some(f=>f.amount>0);
  const empty = isMonthEmpty(m);

  // Category totals
  const catTotals = {};
  cats().forEach(cat=>{ catTotals[cat]=d.variable.filter(v=>v.category===cat).reduce((s,v)=>s+v.amount,0); });

  const catLimitSection = `<div class="cat-limit-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="cat-limit-label">Kategorien &amp; Limits</span>
    </div>
    ${cats().map((cat,i)=>{
      const total=catTotals[cat]||0; const limit=SETTINGS.catLimits[cat]||0;
      const pct=limit?Math.min(total/limit*100,100):0; const over=limit&&total>limit;
      const inUse=isCatInUse(cat);
      return `<div class="cat-limit-row">
        <span class="cat-limit-dot" style="background:${getCatColor(i)}"></span>
        <span class="cat-limit-name">${cat}</span>
        ${limit?`<div class="progress-bar"><div class="progress-fill" style="width:${pct.toFixed(1)}%;background:${over?'var(--red)':getCatColor(i)}"></div></div>`:'<div style="flex:1"></div>'}

        <button class="cat-del-btn" data-delcat="${cat}" style="opacity:${inUse?'.25':'1'};cursor:${inUse?'default':'pointer'}" ${inUse?'disabled':''} title="${inUse?'Wird verwendet':'Löschen'}">×</button>
      </div>`;
    }).join('')}
    <div style="display:flex;gap:8px;margin-top:10px">
      <input type="text" class="qa-input" style="flex:1;font-size:13px" placeholder="Neue Kategorie…" id="newCatInput">

  <div class="summary-row">

      <div class="value" style="color:var(--accent)">${fmt(c.sparen)}</div>

    </div>
    <div class="summary-chip" style="--chip-accent:${c.fazit>=0?'var(--green)':'var(--red)'}">
      <div class="label">Fazit</div>
      <div class="value" style="color:${c.fazit>=0?'var(--green)':'var(--red)'}">${fmt(c.fazit)}</div>
      ${chipDelta(c.fazit,pc?.fazit,true)}

  <!-- Einnahmen -->
  <div class="card" style="--cc:var(--green)">
    <div class="card-title">Einnahmen</div>
    <div class="input-row">
      <label>Gehalt</label>
      <input type="number" inputmode="decimal" step="0.01" value="${d.gehalt||''}" placeholder="0.00" data-field="gehalt">

  <!-- Fixkosten -->
  <div class="card" style="--cc:var(--amber)">
    <div class="card-title">Fixkosten
      <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">${fmt(c.sumFix)}</span>
      ${hasPrevFix?`<button class="small-btn" data-action="copyprev">Vormonat</button>`:''}

    ${d.savings.map((s,i)=>`<div class="input-row">

// ─── Donut Chart ───
function renderDonutChart(catTotals){
  const total = cats().reduce((s,c)=>s+(catTotals[c]||0),0);
  if(!total) return '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">Keine Daten</div>';
  const r=40,cx=60,cy=60,circ=2*Math.PI*r;
  let cumAngle=-90;
  const segments = cats().map((cat,i)=>{
    const pct=(catTotals[cat]||0)/total; const dash=pct*circ;
    if(!dash) return '';
    const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${getCatColor(i)}" stroke-width="18" stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}" transform="rotate(${cumAngle} ${cx} ${cy})"/>`;
    cumAngle+=pct*360; return seg;
  }).join('');
  const legend = cats().map((cat,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="width:10px;height:10px;border-radius:50%;background:${getCatColor(i)};flex-shrink:0"></span>
      <span style="flex:1;font-size:13px;color:var(--text-muted)">${cat}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:13px">${fmt(catTotals[cat]||0)}</span>
    </div>`).join('');
  return `<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <svg viewBox="0 0 120 120" width="130" height="130" style="flex-shrink:0">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="18"/>
      ${segments}
      <text x="${cx}" y="${cy-5}" text-anchor="middle" fill="var(--text-muted)" font-size="8" font-family="Outfit,sans-serif">Gesamt</text>
      <text x="${cx}" y="${cy+8}" text-anchor="middle" fill="var(--text)" font-size="9" font-weight="700" font-family="JetBrains Mono,monospace">${fmt(total)}</text>
    </svg>
    <div style="flex:1;min-width:140px">${legend}</div>
  </div>`;
}

// ─── Year View ───
function renderYearView(){
  const stats = MONTHS.map(m=>({month:m,...calcMonth(m)}));
  const totals = stats.reduce((t,s)=>({einnahmen:t.einnahmen+s.einnahmen,ausgaben:t.ausgaben+s.ausgaben,sparen:t.sparen+s.sparen,fazit:t.fazit+s.fazit}),{einnahmen:0,ausgaben:0,sparen:0,fazit:0});
  const maxVal = Math.max(...stats.map(s=>Math.max(s.einnahmen,s.ausgaben)),1);
  const maxAusgaben = Math.max(...stats.map(s=>s.ausgaben));

  const catTotals = {};
  cats().forEach(c=>{ catTotals[c]=MONTHS.reduce((s,m)=>s+DATA[m].variable.filter(v=>v.category===c).reduce((a,v)=>a+v.amount,0),0); });

  const sz=SETTINGS.sparZiel||0;
  const szPct=sz>0?Math.min(totals.sparen/sz*100,100):0;

  return `
  <div class="header">
    <div><h1>Jahres<span>übersicht</span></h1><div class="header-sub">2026</div></div>
    <button class="header-btn" data-action="reset">Reset</button>
  </div>

  <div class="summary-row">
    <div class="summary-chip" style="--chip-accent:var(--green)"><div class="label">Einnahmen</div><div class="value" style="color:var(--green)">${fmt(totals.einnahmen)}</div></div>
    <div class="summary-chip" style="--chip-accent:var(--red)"><div class="label">Ausgaben</div><div class="value" style="color:var(--red)">${fmt(totals.ausgaben)}</div></div>
    <div class="summary-chip" style="--chip-accent:var(--accent)"><div class="label">Sparen</div><div class="value" style="color:var(--accent)">${fmt(totals.sparen)}</div>${totals.einnahmen>0?`<div class="sub">${Math.round(totals.sparen/totals.einnahmen*100)}% Sparquote</div>`:''}</div>
    <div class="summary-chip" style="--chip-accent:${totals.fazit>=0?'var(--green)':'var(--red)'}"><div class="label">Fazit</div><div class="value" style="color:${totals.fazit>=0?'var(--green)':'var(--red)'}">${fmt(totals.fazit)}</div></div>
  </div>

  <!-- Sparziel -->
  <div class="card" style="--cc:var(--accent)">
    <div class="card-title">Sparziel 2026</div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:${sz?'10px':'14px'}">
      <span style="font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent)">${fmt(totals.sparen)}</span>
      ${sz>0?`<span style="font-size:13px;color:var(--text-muted)">von ${fmt(sz)}</span>`:''}
    </div>
    ${sz>0?`
      <div class="progress-bar" style="margin-bottom:6px">
        <div class="progress-fill" style="width:${szPct.toFixed(1)}%;background:var(--accent)"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:14px">
        <span style="font-size:11px;color:var(--text-muted)">${Math.round(szPct)}% erreicht</span>
        <span style="font-size:11px;color:var(--text-muted)">${fmt(Math.max(sz-totals.sparen,0))} offen</span>
      </div>`
    :'<div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Kein Ziel gesetzt — trage unten einen Betrag ein.</div>'}
    <div class="input-row" style="padding-top:0">
      <label>Sparziel CHF</label>
      <input type="number" inputmode="decimal" step="100" value="${sz||''}" placeholder="0" data-field="sparziel">
    </div>
  </div>

  <!-- Bar Chart -->
  <div class="card">
    <div class="card-title">Einnahmen vs. Ausgaben</div>
    <div class="chart-container">
      <div class="chart-bars">
        ${stats.map((s,i)=>`<div class="chart-col">
          <div class="chart-pair">
            <div class="chart-bar" style="background:var(--green-dim);border:1px solid var(--green);border-bottom:none;height:${maxVal?((s.einnahmen/maxVal)*100):0}%"></div>
            <div class="chart-bar" style="background:var(--red-dim);border:1px solid var(--red);border-bottom:none;height:${maxVal?((s.ausgaben/maxVal)*100):0}%"></div>
          </div>
          <span class="chart-label">${MONTHS_SHORT[i]}</span>
        </div>`).join("")}
      </div>
      <div class="chart-legend">
        <span><span class="chart-legend-dot" style="background:var(--green-dim);border:1px solid var(--green)"></span>Einnahmen</span>
        <span><span class="chart-legend-dot" style="background:var(--red-dim);border:1px solid var(--red)"></span>Ausgaben</span>
      </div>
    </div>
  </div>

  <!-- Gesamt Übersicht -->
  <div class="card" style="overflow-x:auto">
    <div class="card-title">Gesamt Übersicht
      <button class="small-btn" data-action="exportcsv" style="margin-left:auto">CSV Export</button>
    </div>
    <table class="year-table">
      <thead><tr><th>Monat</th><th>Einn.</th><th>Ausg.</th><th>Spar.</th><th>Fazit</th></tr></thead>
      <tbody>
        ${stats.map(s=>{
          const isMax = s.ausgaben>0 && s.ausgaben===maxAusgaben;
          return `<tr data-goto="${s.month}" ${isMax?'class="max-row"':''}>
            <td>${s.month}${isMax?' <span style="font-size:10px;color:var(--red);font-family:Outfit,sans-serif">▲</span>':''}</td>
            <td style="color:var(--green)">${fmt(s.einnahmen)}</td>
            <td style="color:var(--red)">${fmt(s.ausgaben)}</td>
            <td style="color:var(--accent)">${fmt(s.sparen)}</td>
            <td style="color:${s.fazit>=0?'var(--green)':'var(--red)'}">${fmt(s.fazit)}</td>
          </tr>`;
        }).join("")}
        <tr class="total-row"><td>Gesamt</td>
          <td style="color:var(--green)">${fmt(totals.einnahmen)}</td>
          <td style="color:var(--red)">${fmt(totals.ausgaben)}</td>
          <td style="color:var(--accent)">${fmt(totals.sparen)}</td>
          <td style="color:${totals.fazit>=0?'var(--green)':'var(--red)'}">${fmt(totals.fazit)}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Variablekosten Donut -->
  <div class="card" style="--cc:var(--purple)">
    <div class="card-title">Variablekosten nach Kategorie</div>
    ${renderDonutChart(catTotals)}
  </div>

  <div style="height:20px"></div>`;
}

// ─── Event Binding ───
function bindEvents(){
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.onclick = ()=>{ STATE.tab=btn.dataset.tab; render(); };
  });

  document.querySelectorAll(".month-chip").forEach(btn=>{
    btn.onclick = ()=>switchMonth(btn.dataset.month);
  });

  const scroll = document.getElementById("monthScroll");
  if(scroll){
    const active = scroll.querySelector(".month-chip.active");
    if(active) active.scrollIntoView({behavior:"auto",block:"nearest",inline:"center"});
  }

  // Gehalt
  const gehaltInput = document.querySelector("[data-field='gehalt']");
  if(gehaltInput){
    gehaltInput.oninput = ()=>{ DATA[STATE.month].gehalt=parseFloat(gehaltInput.value)||0; saveData(DATA); };
    gehaltInput.onblur = ()=>render();
  }

  // Sparziel
  const sparZielInput = document.querySelector("[data-field='sparziel']");
  if(sparZielInput){
    sparZielInput.oninput = ()=>{ SETTINGS.sparZiel=parseFloat(sparZielInput.value)||0; saveSettings(); };
    sparZielInput.onblur = ()=>render();
  }

  // Fix costs amount
  document.querySelectorAll("[data-fix]").forEach(inp=>{
    inp.oninput = ()=>{ DATA[STATE.month].fix[inp.dataset.fix].amount=parseFloat(inp.value)||0; saveData(DATA); };
    inp.onblur = ()=>render();
  });

  // Fix labels
  document.querySelectorAll("[data-fixlabel]").forEach(inp=>{
    inp.oninput = ()=>{ DATA[STATE.month].fix[inp.dataset.fixlabel].label=inp.value; saveData(DATA); };
  });

  // Fix delete
  document.querySelectorAll("[data-fixdel]").forEach(btn=>{
    btn.onclick = ()=>{ DATA[STATE.month].fix.splice(parseInt(btn.dataset.fixdel),1); saveData(DATA); haptic(15); render(); };
  });

  // Add fix row
  document.querySelectorAll("[data-action='addfix']").forEach(btn=>{
    btn.onclick = ()=>{ DATA[STATE.month].fix.push({label:'Neue Position',amount:0}); saveData(DATA); haptic(); render(); };
  });

  // Savings
  document.querySelectorAll("[data-save]").forEach(inp=>{
    inp.oninput = ()=>{ DATA[STATE.month].savings[inp.dataset.save].amount=parseFloat(inp.value)||0; saveData(DATA); };
    inp.onblur = ()=>render();
  });

  // Category limits
  document.querySelectorAll("[data-catlimit]").forEach(inp=>{
    inp.oninput = ()=>{ SETTINGS.catLimits[inp.dataset.catlimit]=parseFloat(inp.value)||0; saveSettings(); };
    inp.onblur = ()=>render();
  });

  // Quick Add inputs (preserve in STATE, no re-render on blur)
  document.querySelectorAll("[data-qa]").forEach(inp=>{
    inp.oninput = ()=>{ STATE.qa[inp.dataset.qa]=inp.value; };
  });

  // Quick Add submit
  document.querySelectorAll("[data-action='quickadd']").forEach(btn=>{
    btn.onclick = ()=>{
      const desc = STATE.qa.desc?.trim();
      const amount = parseFloat(STATE.qa.amount)||0;
      if(!desc && !amount) return;
      const today = new Date().toISOString().split('T')[0];
      DATA[STATE.month].variable.push({date:today,category:'',desc:desc||'',amount,recurring:false});
      STATE.qa = {desc:'',amount:''};
      saveData(DATA); haptic(); render();
    };
  });

  // Variable cost inputs
  document.querySelectorAll("[data-var]").forEach(inp=>{
    const idx=parseInt(inp.dataset.var); const field=inp.dataset.vfield;
    if(!field) return;
    inp.oninput = ()=>{
      if(field==="amount") DATA[STATE.month].variable[idx][field]=parseFloat(inp.value)||0;
      else DATA[STATE.month].variable[idx][field]=inp.value;
      saveData(DATA);
    };
    inp.onchange = ()=>{ saveData(DATA); render(); };
    inp.onblur = ()=>render();
  });

  // Recurring toggle
  document.querySelectorAll("[data-varrecur]").forEach(btn=>{
    btn.onclick = ()=>{
      const idx=parseInt(btn.dataset.varrecur);
      DATA[STATE.month].variable[idx].recurring=!DATA[STATE.month].variable[idx].recurring;
      saveData(DATA); haptic(); render();
    };
  });

  // Delete variable
  document.querySelectorAll("[data-vardel]").forEach(btn=>{
    btn.onclick = ()=>{ DATA[STATE.month].variable.splice(parseInt(btn.dataset.vardel),1); saveData(DATA); haptic(15); render(); };
  });

  // Add variable
  document.querySelectorAll("[data-action='addvar']").forEach(btn=>{
    btn.onclick = ()=>{ DATA[STATE.month].variable.push({date:'',category:'',desc:'',amount:0,recurring:false}); saveData(DATA); haptic(); render(); };
  });

  // Copy fix from previous month
  document.querySelectorAll("[data-action='copyprev']").forEach(btn=>{
    btn.onclick = ()=>copyFixFromPrev();
  });

  // CSV Export
  document.querySelectorAll("[data-action='exportcsv']").forEach(btn=>{
    btn.onclick = ()=>exportCSV();
  });

  // Delete category
  document.querySelectorAll("[data-delcat]").forEach(btn=>{
    if(btn.disabled) return;
    btn.onclick = ()=>{
      SETTINGS.categories = SETTINGS.categories.filter(c=>c!==btn.dataset.delcat);
      delete SETTINGS.catLimits[btn.dataset.delcat];
      saveSettings(); haptic(15); render();
    };
  });

  // Add category
  document.querySelectorAll("[data-action='addcat']").forEach(btn=>{
    btn.onclick = ()=>{
      const inp = document.getElementById('newCatInput');
      const name = inp?.value?.trim();
      if(!name || SETTINGS.categories.includes(name)) return;
      SETTINGS.categories.push(name);
      saveSettings(); haptic(); render();
    };
  });
  const newCatInput = document.getElementById('newCatInput');
  if(newCatInput){
    newCatInput.onkeydown = e=>{ if(e.key==='Enter') document.querySelector("[data-action='addcat']")?.click(); };
  }

  // Reset
  document.querySelectorAll("[data-action='reset']").forEach(btn=>{
    btn.onclick = ()=>{ STATE.showReset=true; render(); };
  });
  document.querySelectorAll("[data-action='closemodal']").forEach(el=>{
    el.onclick = ()=>{ STATE.showReset=false; render(); };
  });
  document.querySelectorAll("[data-action='confirmreset']").forEach(btn=>{
    btn.onclick = ()=>{
      DATA=Object.fromEntries(MONTHS.map(m=>[m,initMonth()]));
      saveData(DATA); STATE.showReset=false; render();
    };
  });

  // Click month row to navigate
  document.querySelectorAll("[data-goto]").forEach(row=>{
    row.style.cursor="pointer";
    row.onclick = ()=>{ switchMonth(row.dataset.goto); STATE.tab="month"; render(); };
  });
}

// ─── Swipe Gesture (init once) ───
function initGestures(){
  let tx=0, ty=0;
  document.addEventListener('touchstart', e=>{
    tx=e.touches[0].clientX; ty=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend', e=>{
    if(STATE.tab!=='month') return;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<70||Math.abs(dx)<Math.abs(dy)*1.5) return;
    const mi=MONTHS.indexOf(STATE.month);
    if(dx<0 && mi<11) switchMonth(MONTHS[mi+1]);
    else if(dx>0 && mi>0) switchMonth(MONTHS[mi-1]);
  },{passive:true});
}

// ─── Init ───
render();
initGestures();

// ─── Service Worker ───
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(err=>{ console.warn('ServiceWorker registration failed:', err); });
}
</script>
