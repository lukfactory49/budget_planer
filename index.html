<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget 26">
<meta name="theme-color" content="#0c0f16">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Budget 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f16;
  --card: #151921;
  --card-hover: #1a1f2b;
  --border: #222836;
  --text: #e4e6ec;
  --text-muted: #5c6277;
  --accent: #3b82f6;
  --accent-dim: #3b82f620;
  --green: #22c55e;
  --green-dim: #22c55e18;
  --red: #ef4444;
  --red-dim: #ef444418;
  --amber: #f59e0b;
  --amber-dim: #f59e0b18;
  --purple: #a855f7;
  --purple-dim: #a855f718;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Outfit', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-top: var(--safe-top);
  padding-bottom: calc(68px + var(--safe-bottom));
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ── Header ── */
.header {
  padding: 20px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size:22px; font-weight:800; letter-spacing:-.5px; }
.header h1 span { color:var(--accent); }
.header-btn {
  background:var(--card); border:1px solid var(--border); color:var(--text-muted);
  padding:8px 14px; border-radius:10px; font-size:12px; font-weight:600;
  font-family:inherit; cursor:pointer;
}

/* ── Tab Bar (Bottom Nav) ── */
.tab-bar {
  position: fixed; bottom:0; left:0; right:0;
  background: #0c0f16ee;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 12px calc(8px + var(--safe-bottom));
  z-index: 100;
}
.tab-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--text-muted);
  font-family:inherit; font-size:10px; font-weight:600;
  padding:6px 4px; cursor:pointer; transition: color .2s;
}
.tab-btn.active { color:var(--accent); }
.tab-btn svg { width:22px; height:22px; }

/* ── Month Selector (Horizontal Scroll) ── */
.month-scroll {
  display:flex; gap:6px; padding:0 20px 16px;
  overflow-x:auto; scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.month-scroll::-webkit-scrollbar { display:none; }
.month-chip {
  scroll-snap-align:start;
  padding:8px 16px; border-radius:10px;
  background:var(--card); border:1px solid var(--border);
  color:var(--text-muted); font-size:13px; font-weight:600;
  font-family:inherit; cursor:pointer; white-space:nowrap;
  transition: all .15s;
}
.month-chip.active {
  background:var(--accent); border-color:var(--accent); color:#fff;
}

/* ── Cards ── */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px; margin:0 16px 12px;
}
.card-title {
  font-size:13px; font-weight:700; color:var(--text-muted);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.card-title .dot { width:8px; height:8px; border-radius:50%; }

/* ── Summary Chips ── */
.summary-row {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  padding:0 16px 12px;
}
.summary-chip {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px;
}
.summary-chip .label {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--text-muted); margin-bottom:4px;
}
.summary-chip .value {
  font-size:20px; font-weight:700;
  font-family:'JetBrains Mono',monospace;
}

/* ── Input Rows ── */
.input-row {
  display:flex; align-items:center; gap:10px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.input-row:last-child { border-bottom:none; }
.input-row label {
  font-size:13px; color:var(--text-muted); font-weight:500;
  min-width:0; flex:1;
}
.input-row input[type="number"],
.input-row input[type="text"],
.input-row input[type="date"],
.input-row select {
  background:var(--bg); border:1px solid var(--border);
  color:var(--text); border-radius:10px; padding:10px 12px;
  font-family:'JetBrains Mono',monospace; font-size:14px;
  outline:none; width:130px; text-align:right;
  -webkit-appearance:none;
}
.input-row input:focus, .input-row select:focus {
  border-color:var(--accent);
}

/* ── Variable Costs ── */
.var-entry {
  padding:12px 0; border-bottom:1px solid var(--border);
}
.var-entry:last-child { border-bottom:none; }
.var-entry-row {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  margin-bottom:6px;
}
.var-input {
  background:var(--bg); border:1px solid var(--border);
  color:var(--text); border-radius:10px; padding:10px 12px;
  font-family:inherit; font-size:13px; outline:none; width:100%;
}
.var-input:focus { border-color:var(--accent); }
.var-input-amount {
  font-family:'JetBrains Mono',monospace; text-align:right;
}
.var-delete {
  background:var(--red-dim); border:none; color:var(--red);
  width:36px; height:36px; border-radius:10px;
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.var-add {
  width:100%; padding:12px; border-radius:12px;
  background:var(--accent-dim); border:1px dashed var(--accent);
  color:var(--accent); font-size:14px; font-weight:600;
  font-family:inherit; cursor:pointer; margin-top:10px;
}

/* ── Jahresübersicht Table ── */
.year-table {
  width:100%; border-collapse:collapse; font-size:13px;
}
.year-table th {
  text-align:right; padding:10px 8px; font-size:10px;
  font-weight:700; text-transform:uppercase; letter-spacing:.5px;
  color:var(--text-muted); border-bottom:2px solid var(--border);
}
.year-table th:first-child { text-align:left; }
.year-table td {
  padding:10px 8px; text-align:right; border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace; font-size:12px;
}
.year-table td:first-child {
  text-align:left; font-family:'Outfit',sans-serif; font-weight:600; font-size:13px;
}
.year-table tr.total-row {
  background:var(--card-hover);
}
.year-table tr.total-row td { font-weight:700; font-size:13px; }

/* ── Bar Chart ── */
.chart-container { padding:0 4px; }
.chart-bars {
  display:flex; align-items:flex-end; gap:4px; height:140px;
}
.chart-col {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
}
.chart-pair {
  display:flex; gap:2px; align-items:flex-end; width:100%; height:120px;
}
.chart-bar {
  flex:1; border-radius:3px 3px 0 0; min-height:0;
  transition: height .4s ease;
}
.chart-label { font-size:9px; color:var(--text-muted); font-weight:600; }
.chart-legend {
  display:flex; gap:16px; justify-content:center; margin-top:12px;
}
.chart-legend span {
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:var(--text-muted);
}
.chart-legend-dot { width:10px; height:10px; border-radius:3px; }

/* ── Modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:200;
  display:flex; align-items:flex-end; justify-content:center;
  animation: fadeIn .2s;
}
.modal {
  background:var(--card); border-radius:20px 20px 0 0;
  padding:28px 24px calc(28px + var(--safe-bottom));
  width:100%; max-width:500px;
  animation: slideUp .25s ease;
}
.modal h3 { font-size:17px; font-weight:700; margin-bottom:8px; }
.modal p { font-size:14px; color:var(--text-muted); margin-bottom:24px; line-height:1.5; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; }
.modal-btn {
  padding:10px 22px; border-radius:12px; border:none;
  font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
}
.modal-btn-cancel { background:var(--bg); color:var(--text-muted); }
.modal-btn-danger { background:var(--red-dim); color:var(--red); }

/* ── Category breakdown ── */
.cat-table { width:100%; border-collapse:collapse; font-size:12px; }
.cat-table th {
  text-align:right; padding:8px 6px; font-size:9px;
  font-weight:700; text-transform:uppercase; letter-spacing:.4px;
  color:var(--text-muted); border-bottom:2px solid var(--border);
}
.cat-table th:first-child { text-align:left; }
.cat-table td {
  padding:8px 6px; text-align:right; border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted);
}
.cat-table td:first-child {
  text-align:left; font-family:'Outfit',sans-serif; font-weight:600; font-size:12px; color:var(--text);
}

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

/* Hide number input spinners */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
input[type=number] { -moz-appearance:textfield; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── Data ───
const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const MONTHS_SHORT = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const CATEGORIES = ["Essen","Hobby","Freizeit","Ferien","Haushalt"];
const FIX_LABELS = ["Miete/Essen","Krankenkasse","Handy/Spotify","Motorrad Vers.","Weiterbildung","Steuern"];
const SAVE_LABELS = ["Sparkonto","Invest.","Säule 3a"];
const STORAGE_KEY = "budget2026_v2";

const fmt = v => new Intl.NumberFormat("de-CH",{style:"currency",currency:"CHF"}).format(v||0);
const fmtShort = v => {
  if(Math.abs(v)>=1000) return (v/1000).toFixed(1)+"k";
  return v.toFixed(0);
};

function initMonth(){
  return {
    gehalt:0,
    fix: FIX_LABELS.map(l=>({label:l,amount:0})),
    savings: SAVE_LABELS.map(l=>({label:l,amount:0})),
    variable: []
  };
}

function loadData(){
  try { const d=localStorage.getItem(STORAGE_KEY); if(d) return JSON.parse(d); } catch(e){}
  return Object.fromEntries(MONTHS.map(m=>[m,initMonth()]));
}

function saveData(data){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}catch(e){} }

let DATA = loadData();
let STATE = { tab:"month", month:MONTHS[new Date().getMonth()], showReset:false };

// ─── Calc helpers ───
function calcMonth(m){
  const d = DATA[m];
  const sumFix = d.fix.reduce((s,f)=>s+f.amount,0);
  const sumVar = d.variable.reduce((s,v)=>s+v.amount,0);
  const sumSave = d.savings.reduce((s,sv)=>s+sv.amount,0);
  const ausgaben = sumFix + sumVar + sumSave;
  return { einnahmen:d.gehalt, ausgaben, sparen:sumSave, fazit:d.gehalt-ausgaben, sumFix, sumVar, sumSave };
}

// ─── Render Engine ───
function render(){
  const app = document.getElementById("app");
  if(STATE.tab==="month") app.innerHTML = renderMonthView();
  else app.innerHTML = renderYearView();
  app.innerHTML += renderTabBar();
  if(STATE.showReset) app.innerHTML += renderResetModal();
  bindEvents();
}

function renderTabBar(){
  return `<nav class="tab-bar">
    <button class="tab-btn ${STATE.tab==='month'?'active':''}" data-tab="month">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Monat
    </button>
    <button class="tab-btn ${STATE.tab==='year'?'active':''}" data-tab="year">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4z"/></svg>
      Übersicht
    </button>
  </nav>`;
}

// ─── Month View ───
function renderMonthView(){
  const m = STATE.month;
  const d = DATA[m];
  const c = calcMonth(m);

  return `
  <div class="header">
    <h1>Budget <span>2026</span></h1>
    <button class="header-btn" data-action="reset">Reset</button>
  </div>

  <div class="month-scroll" id="monthScroll">
    ${MONTHS.map((mo,i)=>`<button class="month-chip ${mo===m?'active':''}" data-month="${mo}">${MONTHS_SHORT[i]}</button>`).join("")}
  </div>

  <div class="summary-row">
    <div class="summary-chip"><div class="label">Einnahmen</div><div class="value" style="color:var(--green)">${fmt(c.einnahmen)}</div></div>
    <div class="summary-chip"><div class="label">Ausgaben</div><div class="value" style="color:var(--red)">${fmt(c.ausgaben)}</div></div>
    <div class="summary-chip"><div class="label">Sparen</div><div class="value" style="color:var(--accent)">${fmt(c.sparen)}</div></div>
    <div class="summary-chip"><div class="label">Fazit</div><div class="value" style="color:${c.fazit>=0?'var(--green)':'var(--red)'}">${fmt(c.fazit)}</div></div>
  </div>

  <!-- Einnahmen -->
  <div class="card">
    <div class="card-title"><span class="dot" style="background:var(--green)"></span>Einnahmen</div>
    <div class="input-row">
      <label>Gehalt</label>
      <input type="number" step="0.01" value="${d.gehalt||''}" placeholder="0.00" data-field="gehalt">
    </div>
  </div>

  <!-- Fixkosten -->
  <div class="card">
    <div class="card-title"><span class="dot" style="background:var(--amber)"></span>Fixkosten<span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">${fmt(c.sumFix)}</span></div>
    ${d.fix.map((f,i)=>`<div class="input-row">
      <label>${f.label}</label>
      <input type="number" step="0.01" value="${f.amount||''}" placeholder="0.00" data-fix="${i}">
    </div>`).join("")}
  </div>

  <!-- Sparen -->
  <div class="card">
    <div class="card-title"><span class="dot" style="background:var(--accent)"></span>Sparen<span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">${fmt(c.sumSave)}</span></div>
    ${d.savings.map((s,i)=>`<div class="input-row">
      <label>${s.label}</label>
      <input type="number" step="0.01" value="${s.amount||''}" placeholder="0.00" data-save="${i}">
    </div>`).join("")}
  </div>

  <!-- Variable Kosten -->
  <div class="card">
    <div class="card-title"><span class="dot" style="background:var(--purple)"></span>Variable Kosten<span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">${fmt(c.sumVar)}</span></div>
    ${d.variable.length===0?'<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">Keine Einträge</div>':''}
    ${d.variable.map((v,i)=>`<div class="var-entry">
      <div class="var-entry-row">
        <input type="date" class="var-input" value="${v.date}" data-var="${i}" data-vfield="date">
        <select class="var-input" data-var="${i}" data-vfield="category">
          <option value="">Kategorie</option>
          ${CATEGORIES.map(cat=>`<option value="${cat}" ${v.category===cat?'selected':''}>${cat}</option>`).join("")}
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" class="var-input" style="flex:1" placeholder="Beschreibung" value="${v.desc||''}" data-var="${i}" data-vfield="desc">
        <input type="number" step="0.01" class="var-input var-input-amount" style="width:100px" placeholder="0.00" value="${v.amount||''}" data-var="${i}" data-vfield="amount">
        <button class="var-delete" data-vardel="${i}">×</button>
      </div>
    </div>`).join("")}
    <button class="var-add" data-action="addvar">+ Neuer Eintrag</button>
  </div>

  <div style="height:20px"></div>`;
}

// ─── Year View ───
function renderYearView(){
  const stats = MONTHS.map(m=>({month:m, ...calcMonth(m)}));
  const totals = stats.reduce((t,s)=>({einnahmen:t.einnahmen+s.einnahmen,ausgaben:t.ausgaben+s.ausgaben,sparen:t.sparen+s.sparen,fazit:t.fazit+s.fazit}),{einnahmen:0,ausgaben:0,sparen:0,fazit:0});
  const maxVal = Math.max(...stats.map(s=>Math.max(s.einnahmen,s.ausgaben)),1);

  // Category breakdown
  const catData = MONTHS.map((m,i)=>{
    const cats = {};
    CATEGORIES.forEach(c=>{ cats[c] = DATA[m].variable.filter(v=>v.category===c).reduce((s,v)=>s+v.amount,0); });
    return {month:MONTHS_SHORT[i], ...cats};
  });

  return `
  <div class="header">
    <h1>Jahres<span>übersicht</span></h1>
    <button class="header-btn" data-action="reset">Reset</button>
  </div>

  <div class="summary-row">
    <div class="summary-chip"><div class="label">Einnahmen</div><div class="value" style="color:var(--green)">${fmt(totals.einnahmen)}</div></div>
    <div class="summary-chip"><div class="label">Ausgaben</div><div class="value" style="color:var(--red)">${fmt(totals.ausgaben)}</div></div>
    <div class="summary-chip"><div class="label">Sparen</div><div class="value" style="color:var(--accent)">${fmt(totals.sparen)}</div></div>
    <div class="summary-chip"><div class="label">Fazit</div><div class="value" style="color:${totals.fazit>=0?'var(--green)':'var(--red)'}">${fmt(totals.fazit)}</div></div>
  </div>

  <!-- Bar Chart -->
  <div class="card">
    <div class="card-title">Einnahmen vs. Ausgaben</div>
    <div class="chart-container">
      <div class="chart-bars">
        ${stats.map((s,i)=>`<div class="chart-col">
          <div class="chart-pair">
            <div class="chart-bar" style="background:var(--green-dim);border:1px solid var(--green);border-bottom:none;height:${maxVal?((s.einnahmen/maxVal)*100):0}%"></div>
            <div class="chart-bar" style="background:var(--red-dim);border:1px solid var(--red);border-bottom:none;height:${maxVal?((s.ausgaben/maxVal)*100):0}%"></div>
          </div>
          <span class="chart-label">${MONTHS_SHORT[i]}</span>
        </div>`).join("")}
      </div>
      <div class="chart-legend">
        <span><span class="chart-legend-dot" style="background:var(--green-dim);border:1px solid var(--green)"></span>Einnahmen</span>
        <span><span class="chart-legend-dot" style="background:var(--red-dim);border:1px solid var(--red)"></span>Ausgaben</span>
      </div>
    </div>
  </div>

  <!-- Gesamt Übersicht -->
  <div class="card" style="overflow-x:auto">
    <div class="card-title">Gesamt Übersicht</div>
    <table class="year-table">
      <thead><tr><th>Monat</th><th>Einn.</th><th>Ausg.</th><th>Spar.</th><th>Fazit</th></tr></thead>
      <tbody>
        ${stats.map(s=>`<tr data-goto="${s.month}">
          <td>${s.month}</td>
          <td style="color:var(--green)">${fmt(s.einnahmen)}</td>
          <td style="color:var(--red)">${fmt(s.ausgaben)}</td>
          <td style="color:var(--accent)">${fmt(s.sparen)}</td>
          <td style="color:${s.fazit>=0?'var(--green)':'var(--red)'}">${fmt(s.fazit)}</td>
        </tr>`).join("")}
        <tr class="total-row"><td>Gesamt</td>
          <td style="color:var(--green)">${fmt(totals.einnahmen)}</td>
          <td style="color:var(--red)">${fmt(totals.ausgaben)}</td>
          <td style="color:var(--accent)">${fmt(totals.sparen)}</td>
          <td style="color:${totals.fazit>=0?'var(--green)':'var(--red)'}">${fmt(totals.fazit)}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Variablekosten Breakdown -->
  <div class="card" style="overflow-x:auto">
    <div class="card-title">Variablekosten nach Kategorie</div>
    <table class="cat-table">
      <thead><tr><th>Mon.</th>${CATEGORIES.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
      <tbody>
        ${catData.map(cd=>`<tr>
          <td>${cd.month}</td>
          ${CATEGORIES.map(c=>`<td style="color:${cd[c]?'var(--text)':'var(--text-muted)'}">${fmt(cd[c])}</td>`).join("")}
        </tr>`).join("")}
      </tbody>
    </table>
  </div>

  <div style="height:20px"></div>`;
}

function renderResetModal(){
  return `<div class="modal-overlay" data-action="closemodal">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Alle Daten zurücksetzen?</h3>
      <p>Sämtliche Budget-Daten werden unwiderruflich gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" data-action="closemodal">Abbrechen</button>
        <button class="modal-btn modal-btn-danger" data-action="confirmreset">Zurücksetzen</button>
      </div>
    </div>
  </div>`;
}

// ─── Event Binding ───
function bindEvents(){
  // Tab navigation
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.onclick = ()=>{ STATE.tab=btn.dataset.tab; render(); };
  });

  // Month chips
  document.querySelectorAll(".month-chip").forEach(btn=>{
    btn.onclick = ()=>{ STATE.month=btn.dataset.month; render(); };
  });

  // Scroll active month into view
  const scroll = document.getElementById("monthScroll");
  if(scroll){
    const active = scroll.querySelector(".month-chip.active");
    if(active) active.scrollIntoView({behavior:"instant",block:"nearest",inline:"center"});
  }

  // Gehalt
  const gehaltInput = document.querySelector("[data-field='gehalt']");
  if(gehaltInput){
    gehaltInput.oninput = ()=>{ DATA[STATE.month].gehalt=parseFloat(gehaltInput.value)||0; saveData(DATA); render(); };
  }

  // Fix costs
  document.querySelectorAll("[data-fix]").forEach(inp=>{
    inp.oninput = ()=>{ DATA[STATE.month].fix[inp.dataset.fix].amount=parseFloat(inp.value)||0; saveData(DATA); render(); };
  });

  // Savings
  document.querySelectorAll("[data-save]").forEach(inp=>{
    inp.oninput = ()=>{ DATA[STATE.month].savings[inp.dataset.save].amount=parseFloat(inp.value)||0; saveData(DATA); render(); };
  });

  // Variable cost inputs
  document.querySelectorAll("[data-var]").forEach(inp=>{
    if(inp.dataset.vardel!==undefined) return;
    const idx = parseInt(inp.dataset.var);
    const field = inp.dataset.vfield;
    inp.oninput = inp.onchange = ()=>{
      if(field==="amount") DATA[STATE.month].variable[idx][field]=parseFloat(inp.value)||0;
      else DATA[STATE.month].variable[idx][field]=inp.value;
      saveData(DATA);
      // Don't re-render on every keystroke for text fields
      if(field==="amount"||field==="category"||field==="date") render();
    };
  });

  // Delete variable
  document.querySelectorAll("[data-vardel]").forEach(btn=>{
    btn.onclick = ()=>{ DATA[STATE.month].variable.splice(parseInt(btn.dataset.vardel),1); saveData(DATA); render(); };
  });

  // Add variable
  document.querySelectorAll("[data-action='addvar']").forEach(btn=>{
    btn.onclick = ()=>{ DATA[STATE.month].variable.push({date:"",category:"",desc:"",amount:0}); saveData(DATA); render(); };
  });

  // Reset
  document.querySelectorAll("[data-action='reset']").forEach(btn=>{
    btn.onclick = ()=>{ STATE.showReset=true; render(); };
  });
  document.querySelectorAll("[data-action='closemodal']").forEach(el=>{
    el.onclick = ()=>{ STATE.showReset=false; render(); };
  });
  document.querySelectorAll("[data-action='confirmreset']").forEach(btn=>{
    btn.onclick = ()=>{
      DATA = Object.fromEntries(MONTHS.map(m=>[m,initMonth()]));
      saveData(DATA); STATE.showReset=false; render();
    };
  });

  // Click month row to navigate
  document.querySelectorAll("[data-goto]").forEach(row=>{
    row.style.cursor="pointer";
    row.onclick = ()=>{ STATE.month=row.dataset.goto; STATE.tab="month"; render(); };
  });
}

// ─── Init ───
render();

// ─── Service Worker ───
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
